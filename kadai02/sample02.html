<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo Stylish</title>
        <style>
            :root {
                --bg: #f4f7fb;
                --card: #ffffff;
                --accent: #5b8def;
                --muted: #6b7280;
                --edit: #0f766e;
                --delete: #dc2626;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
                    sans-serif;
                background: linear-gradient(180deg, var(--bg), #e9eef9);
                color: #111827;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 24px;
            }
            .app {
                width: 100%;
                max-width: 540px;
                background: var(--card);
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(20, 40, 80, 0.08);
                padding: 24px;
            }
            h1 {
                margin: 0 0 16px 0;
                font-size: 20px;
                letter-spacing: 0.2px;
                color: #0f172a;
            }
            .controls {
                display: flex;
                gap: 8px;
                margin-bottom: 18px;
            }
            .input-todo {
                flex: 1;
                padding: 10px 12px;
                border: 1px solid #e6e9ef;
                border-radius: 10px;
                font-size: 14px;
                outline: none;
                transition:
                    box-shadow 0.15s,
                    border-color 0.15s;
            }
            .input-todo:focus {
                border-color: var(--accent);
                box-shadow: 0 4px 12px rgba(91, 141, 239, 0.12);
            }
            .add-todo {
                background: linear-gradient(180deg, var(--accent), #3b6fd6);
                color: #fff;
                border: none;
                padding: 10px 14px;
                border-radius: 10px;
                cursor: pointer;
                font-weight: 600;
                box-shadow: 0 6px 12px rgba(59, 111, 214, 0.18);
            }
            .add-todo:hover {
                transform: translateY(-1px);
            }
            .todo {
                list-style: none;
                padding: 0;
                margin: 0;
                display: grid;
                gap: 10px;
            }
            .todo li {
                background: #fbfdff;
                border: 1px solid #eef2ff;
                padding: 12px 14px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 14px;
                color: #111827;
            }
            .todo li .label {
                color: #111827;
            }
            .todo li button:first-of-type {
                margin-left: auto;
            }
            .edit-todo,
            .delete,
            .remove {
                border: none;
                border-radius: 8px;
                color: #fff;
                cursor: pointer;
                font-size: 12px;
                font-weight: 700;
                line-height: 1;
                min-width: 64px;
                padding: 8px 10px;
                transition:
                    transform 0.15s,
                    box-shadow 0.15s,
                    opacity 0.15s;
            }
            .edit-todo {
                background: linear-gradient(180deg, #14b8a6, var(--edit));
                box-shadow: 0 4px 10px rgba(15, 118, 110, 0.18);
            }
            .delete,
            .remove {
                background: linear-gradient(180deg, #f87171, var(--delete));
                box-shadow: 0 4px 10px rgba(220, 38, 38, 0.18);
            }
            .edit-todo:hover,
            .delete:hover,
            .remove:hover {
                transform: translateY(-1px);
                opacity: 0.92;
            }
            .empty {
                text-align: center;
                color: #9ca3af;
                padding: 20px 0;
            }
        </style>
        <script defer src="js/sample-02.js"></script>
    </head>
    <body>
        <div class="app">
            <h1>My Stylish Todo</h1>
            <div class="controls">
                <input type="text" class="input-todo" placeholder="Add a new task..." />
                <button class="add-todo">Add</button>
            </div>
            <div>
                <ul class="todo">
                    <li><span class="label">TODO ITEM</span></li>
                </ul>
            </div>
        </div>
    </body>
</html>
